<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY SSLC RESULT | TONIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Playfair+Display:ital,wght@1,900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff85a2; --bg: #fffcfc; }
        body { margin: 0; font-family: 'Playfair Display', serif; background: var(--bg); overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 200vh; }

        /* Flower Petals (ബാക്ക്ഗ്രൗണ്ട് പൂക്കൾ) */
        .flower { position: fixed; top: -50px; z-index: 1000; pointer-events: none; width: 20px; height: 25px; background: #ffb7c5; border-radius: 80% 10% 80% 10%; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        .top-header { margin-top: 50px; font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--pink); letter-spacing: 5px; text-align: center; }
        
        /* Photo Stack & Pure Original Look */
        .photo-stack { position: relative; width: 240px; height: 320px; z-index: 10; margin: 20px 0; }
        .frame { position: absolute; width: 100%; height: 100%; background: white; padding: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-radius: 12px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: zoom-in; }
        .f1 { transform: rotate(3deg); z-index: 5; }
        .f2 { transform: rotate(-6deg); z-index: 4; top: 15px; left: -20px; opacity: 0.8; }
        
        /* No Filters: ഒറിജിനൽ ലുക്ക് (Blur & Filter removed) */
        .frame img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 8px; 
            filter: none; /* എല്ലാ ഫിൽട്ടറുകളും മാറ്റി */
            image-rendering: auto; /* ക്ലാരിറ്റി കൂടാതിരിക്കാൻ */
        }

        /* Pure Zoom with clear background (Blur overlay removed) */
        .overlay-dim { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(255, 252, 252, 0.3); /* കുറച്ചു പിങ്ക് ലുക്ക് മാത്രം */
            z-index: 55000; 
            /* Blur പൂർണ്ണമായി മാറ്റി */
        }

        /* Centered Zoom */
        .frame.zoom { 
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) rotate(0deg) scale(1.3); 
            width: 90vw; max-width: 480px; height: auto; 
            z-index: 60000; cursor: zoom-out; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .frame.zoom img { object-fit: contain; }

        /* Tension Modal & Grades */
        .tension-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 30000; flex-direction: column; justify-content: center; align-items: center; }
        .tension-emoji { font-size: 7rem; }
        .big-grade { font-size: 9rem; font-family: 'Cinzel'; color: var(--pink); display: none; font-weight: 900; }

        /* Paper Memo & Subjects */
        .paper-roll { background: #fff; width: 90%; max-width: 450px; padding: 0 30px; box-shadow: 0 50px 100px rgba(0,0,0,0.05); max-height: 0; overflow: hidden; transition: max-height 2s ease; border-bottom: 15px solid var(--pink); border-radius: 0 0 30px 30px; margin-bottom: 50px; }
        .paper-roll.active { max-height: 3000px; padding: 40px 30px; }
        .row { display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px dashed #eee; font-weight: bold; }

        /* Link Generator Popup */
        .gen-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 420px; background: white; z-index: 70000; border-radius: 25px; padding: 25px; box-shadow: 0 0 100px rgba(0,0,0,0.4); max-height: 85vh; overflow-y: auto; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body onclick="startMusic()" onscroll="startMusic()">

<div class="overlay-dim" id="dimOverlay" onclick="closeZoom()"></div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://www.image2url.com/r2/default/audio/1778722314640-0ea05ae7-e5c0-4ae6-8fd7-4a618e5752f4.mp3" type="audio/mpeg">
</audio>

<div id="flower-field"></div>
<div class="top-header">MY SSLC RESULT</div>

<div class="hero" style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="photo-stack">
        <div class="frame f1" id="frame1" onclick="zoomImg('frame1')">
            <img src="https://i.ibb.co/BKyf8wmD/IMG-20260513-WA0013.jpg">
        </div>
        <div class="frame f2" id="frame2" onclick="zoomImg('frame2')">
            <img src="https://i.ibb.co/K1Vnm5B/IMG-20260513-WA0014.jpg">
        </div>
    </div>
    <h1 id="displayName" style="font-family:'Dancing Script'; color:var(--pink); font-size:3rem; margin:10px 0;">Faris Tonix</h1>
    <p style="color: #bbb; font-size: 13px;">Tap photos for pure view • Scroll for Memo</p>
</div>

<div class="tension-modal" id="tensionModal">
    <div id="emojiLayer">
        <div class="tension-emoji" id="tEmoji">😭</div>
        <p style="color:var(--pink); font-weight:bold;">CHECKING RESULT...</p>
    </div>
    <div class="big-grade" id="finalGrade"></div>
</div>

<div class="paper-roll" id="paper">
    <h2 style="text-align:center; font-family:'Cinzel';">OFFICIAL MEMO 2026</h2>
    <div id="resultBox"></div>
    <button class="btn" style="background:#111; color:#fff;" onclick="openGen()">CREATE YOUR CUSTOM LINK ✨</button>
</div>

<div class="gen-popup" id="genPopup">
    <h3 style="text-align:center; color:var(--pink);">Link Generator</h3>
    <input type="text" id="inName" placeholder="Candidate Name" style="width:94%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
    <div id="gradeInputs"></div>
    <button class="btn" style="background:var(--pink); color:white;" onclick="generateLink()">GENERATE NEW LINK</button>
    <button class="btn" style="background:#eee;" onclick="document.getElementById('genPopup').style.display='none'">CLOSE</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    const audio = document.getElementById('bgMusic');
    let musicStarted = false;

    function startMusic() { if (!musicStarted) { audio.play().then(() => { musicStarted = true; }).catch(() => {}); } }

    function zoomImg(id) {
        startMusic();
        const frame = document.getElementById(id);
        if(frame.classList.contains('zoom')) { closeZoom(); } 
        else { 
            closeZoom(); 
            frame.classList.add('zoom'); 
            document.getElementById('dimOverlay').style.display = 'block'; 
        }
    }

    function closeZoom() {
        document.querySelectorAll('.frame').forEach(f => f.classList.remove('zoom'));
        document.getElementById('dimOverlay').style.display = 'none';
    }

    const subs = ["Language I", "Language II", "English", "Hindi", "Social", "Physics", "Chemistry", "Biology", "Maths", "IT"];
    const emojis = ["😭", "🤧", "😞", "😦", "🥲", "😱", "🤯", "😫"];
    
    subs.forEach((s, i) => {
        document.getElementById('resultBox').innerHTML += `<div class="row"><span>${s}</span><span id="res${i}" onclick="reveal(${i})" style="color:var(--pink); cursor:pointer;">REVEAL ></span></div>`;
        document.getElementById('gradeInputs').innerHTML += `<div style="display:flex; justify-content:space-between; margin:5px 0;"><small>${s}</small><select id="sel${i}"><option>A+</option><option>A</option><option>B+</option><option>B</option><option>C</option><option>D+</option></select></div>`;
    });

    const params = new URLSearchParams(window.location.search);
    if(params.has('name')) {
        document.getElementById('displayName').innerText = params.get('name');
        subs.forEach((_, i) => { if(params.has('g'+i)) document.getElementById('sel'+i).value = params.get('g'+i); });
    }

    function generateLink() {
        const name = document.getElementById('inName').value || "Faris";
        let newUrl = window.location.origin + window.location.pathname + "?name=" + encodeURIComponent(name);
        subs.forEach((_, i) => { newUrl += `&g${i}=${encodeURIComponent(document.getElementById('sel'+i).value)}`; });
        window.history.pushState({}, '', newUrl);
        document.getElementById('displayName').innerText = name;
        document.getElementById('genPopup').style.display = 'none';
        alert("Link Updated!");
    }

    function reveal(i) {
        startMusic();
        const span = document.getElementById('res'+i);
        if(!span.innerText.includes('REVEAL')) return;
        const modal = document.getElementById('tensionModal');
        modal.style.display = 'flex';
        document.getElementById('emojiLayer').style.display = 'block';
        document.getElementById('finalGrade').style.display = 'none';
        let c = 0;
        let t = setInterval(() => {
            document.getElementById('tEmoji').innerText = emojis[c % emojis.length];
            if(c++ > 15) {
                clearInterval(t);
                document.getElementById('emojiLayer').style.display = 'none';
                const g = document.getElementById('sel'+i).value;
                const fg = document.getElementById('finalGrade');
                fg.innerText = g; fg.style.display = 'block';
                confetti({particleCount: 150, spread: 70, origin: { y: 0.6 }});
                modal.onclick = () => { modal.style.display = 'none'; span.innerText = g; modal.onclick = null; };
            }
        }, 120);
    }

    setInterval(() => {
        const p = document.createElement('div');
        p.className = 'flower';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (Math.random() * 2 + 3) + 's';
        document.getElementById('flower-field').appendChild(p);
        setTimeout(() => p.remove(), 5000);
    }, 450);

    function openGen() { document.getElementById('genPopup').style.display = 'block'; }
    window.onscroll = () => { if(window.scrollY > 80) { document.getElementById('paper').classList.add('active'); startMusic(); } };
</script>
</body>
        </html>
